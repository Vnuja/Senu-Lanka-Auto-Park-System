<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Reports Index</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row">
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body text-center p-4">
                        <i class="fas fa-calendar-check fa-3x text-primary mb-3"></i>
                        <h5>Attendance Trends</h5>
                        <p class="text-muted small">Analyze staff presence, lateness, and absence patterns over time.</p>
                        <a href="/reports/attendance" class="btn btn-outline-primary btn-sm">Generate Report</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body text-center p-4">
                        <i class="fas fa-wallet fa-3x text-success mb-3"></i>
                        <h5>Payroll Summaries</h5>
                        <p class="text-muted small">Overview of monthly salary costs, allowances, and deductions.</p>
                        <a href="/reports/payroll" class="btn btn-outline-success btn-sm">Generate Report</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body text-center p-4">
                        <i class="fas fa-star fa-3x text-warning mb-3"></i>
                        <h5>Performance Review</h5>
                        <p class="text-muted small">Aggregation of staff ratings and department-wise performance.</p>
                        <button class="btn btn-outline-warning btn-sm" disabled>Coming Soon</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Attendance Report</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Attendance Trend Report</span>
                <a href="/reports" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i> Back</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover datatable">
                        <thead>
                            <tr>
                                <th>Staff</th>
                                <th>Date</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${records == null or records.empty}">
                                <td colspan="5" class="text-center text-muted">No attendance records found for this period.</td>
                            </tr>
                            <tr th:each="rec : ${records}">
                                <td th:text="${rec.user.username}">User</td>
                                <td th:text="${rec.date}">Date</td>
                                <td th:text="${rec.checkIn}">In</td>
                                <td th:text="${rec.checkOut}">Out</td>
                                <td>
                                    <span class="badge" th:classappend="${rec.status.name() == 'PRESENT' ? 'bg-success' : 'bg-danger'}" th:text="${rec.status}">Present</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

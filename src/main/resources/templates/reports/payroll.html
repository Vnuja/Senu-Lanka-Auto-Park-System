<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Payroll Report</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Payroll Cost Report</span>
                <a href="/reports" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i> Back</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover datatable">
                        <thead>
                            <tr>
                                <th>Staff</th>
                                <th>Basic Salary</th>
                                <th>Allowances</th>
                                <th>Deductions</th>
                                <th>Net Salary</th>
                                <th>Generated At</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${payrolls == null or payrolls.empty}">
                                <td colspan="6" class="text-center text-muted">No payroll records found for this period.</td>
                            </tr>
                            <tr th:each="p : ${payrolls}">
                                <td th:text="${p.user.username}">User</td>
                                <td th:text="${p.basicSalary}">0.00</td>
                                <td th:text="${p.allowances}">0.00</td>
                                <td th:text="${p.deductions}">0.00</td>
                                <td class="fw-bold" th:text="${p.netSalary}">0.00</td>
                                <td th:text="${#temporals.format(p.generatedAt, 'yyyy-MM-dd HH:mm')}">Time</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="${title}">User Form</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header" th:text="${title}">User Details</div>
                    <div class="card-body">
                        <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                            <input type="hidden" th:field="*{userId}">
                            
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" th:field="*{username}" class="form-control" placeholder="Enter username" required>
                            </div>
                            
                            <div class="mb-3" th:if="*{userId == null}">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" th:field="*{passwordHash}" class="form-control" placeholder="Enter password" required>
                                <div class="form-text">For security, passwords are hashed before storage.</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="example@mail.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="role" class="form-label">Assign Role</label>
                                <select th:field="*{role}" class="form-select" required>
                                    <option th:each="roleOpt : ${roles}" 
                                            th:value="${roleOpt}" 
                                            th:text="${roleOpt}">ROLE</option>
                                </select>
                            </div>
                            
                            <div class="mb-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{active}" id="isActive">
                                    <label class="form-check-label" for="isActive">Account Active</label>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Save User</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

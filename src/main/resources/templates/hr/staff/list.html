<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Staff Directory</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Staff Profiles</span>
                <a th:href="@{/hr/staff/new}" class="btn btn-sm btn-primary">
                    <i class="fas fa-plus-circle me-1"></i> Add Member
                </a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover datatable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Job Title</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="staff : ${staffList}">
                                <td th:text="${staff.fullName}">Jane Doe</td>
                                <td th:text="${staff.department != null ? staff.department.deptName : 'N/A'}">HR</td>
                                <td th:text="${staff.jobTitle}">Manager</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${staff.employmentType}">FULL_TIME</span>
                                </td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/hr/staff/edit/{id}(id=${staff.profileId})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/hr/staff/delete/{id}(id=${staff.profileId})}" 
                                           class="btn btn-sm btn-outline-danger"
                                           onclick="return confirm('Delete this staff profile?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - Staff MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
        .error-card { text-align: center; max-width: 500px; padding: 40px; }
        .error-code { font-size: 6rem; font-weight: 800; color: #ef4444; }
    </style>
</head>
<body>
    <div class="error-card">
        <h1 class="error-code">403</h1>
        <h2 class="mb-4">Access Denied</h2>
        <p class="text-muted mb-4">Sorry, you don't have permission to access this page. Please contact your administrator if you think this is a mistake.</p>
        <a href="javascript:history.back()" class="btn btn-primary">Go Back</a>
    </div>
</body>
</html>

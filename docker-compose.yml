version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: staffms_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: staff_mgmt_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Map the schema.sql to the docker-entrypoint-initdb.d folder to run on first setup
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:

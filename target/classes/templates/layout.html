<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Staff MS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #6366f1;
            --dark-bg: #0f172a;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        /* Sidebar Styles */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--dark-bg);
            color: white;
            transition: all 0.3s;
            z-index: 1000;
        }

        #sidebar .sidebar-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #sidebar ul.components {
            padding: 20px 0;
        }

        #sidebar ul li a {
            padding: 12px 25px;
            display: block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        #sidebar ul li a:hover, #sidebar ul li.active a {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--primary-color);
        }

        #sidebar ul li a i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        /* Main Content Styles */
        #content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            transition: all 0.3s;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 30px;
        }

        .main-container {
            padding: 30px;
        }

        /* Card Styles */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        .card-header {
            background-color: white;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 600;
            padding: 15px 20px;
            border-top-left-radius: 12px !important;
            border-top-right-radius: 12px !important;
        }

        /* Button Styles */
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        /* Dashboard Stats */
        .stat-card {
            padding: 20px;
            text-align: center;
        }
        
        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        @media (max-width: 768px) {
            #sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
            }
            #sidebar.active {
                margin-left: 0;
            }
            #content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper d-flex">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-users-cog me-2"></i>StaffMS</h3>
            </div>

            <ul class="list-unstyled components">
                <li sec:authorize="hasRole('SYSTEM_ADMIN')">
                    <a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Admin Dashboard</a>
                </li>
                <li sec:authorize="hasRole('HR_MANAGER')">
                    <a href="/hr/dashboard"><i class="fas fa-user-tie"></i> HR Dashboard</a>
                </li>
                <li sec:authorize="hasRole('DEPT_MANAGER')">
                    <a href="/manager/dashboard"><i class="fas fa-tasks"></i> Dept Dashboard</a>
                </li>
                <li sec:authorize="hasRole('STAFF')">
                    <a href="/staff/dashboard"><i class="fas fa-user"></i> My Dashboard</a>
                </li>
                <li sec:authorize="hasRole('IT_SUPPORT')">
                    <a href="/it/dashboard"><i class="fas fa-headset"></i> IT Support</a>
                </li>

                <hr class="mx-3 opacity-25">

                <li sec:authorize="hasAnyRole('SYSTEM_ADMIN')">
                    <a href="/hr/staff"><i class="fas fa-id-card"></i> Staff Directory</a>
                </li>
                <li>
                    <a href="/attendance"><i class="fas fa-clock"></i> Attendance</a>
                </li>
                <li>
                    <a href="/leave"><i class="fas fa-calendar-alt"></i> Leave Requests</a>
                </li>
                <li sec:authorize="hasAnyRole('SYSTEM_ADMIN', 'HR_MANAGER')">
                    <a href="/payroll"><i class="fas fa-money-check-alt"></i> Payroll</a>
                </li>
                <li>
                    <a href="/tickets"><i class="fas fa-ticket-alt"></i> Support Tickets</a>
                </li>
                <li sec:authorize="hasAnyRole('SYSTEM_ADMIN', 'ORG_MANAGEMENT')">
                    <a href="/reports"><i class="fas fa-chart-line"></i> Reports</a>
                </li>
                <li sec:authorize="hasRole('SYSTEM_ADMIN')">
                    <a href="/admin/logs"><i class="fas fa-history"></i> System Logs</a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-outline-secondary me-3">
                        <i class="fas fa-align-left"></i>
                    </button>
                    
                    <div class="d-flex align-items-center ms-auto">
                        <div class="dropdown">
                            <button class="btn dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle fs-4 me-2 text-primary"></i>
                                <span class="d-none d-md-inline" sec:authentication="name">Username</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item" href="/profile"><i class="fas fa-id-badge me-2"></i> My Profile</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                        <button type="submit" class="dropdown-item text-danger border-0 bg-transparent w-100 text-start">
                                            <i class="fas fa-sign-out-alt me-2"></i> Logout
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="main-container">
                <!-- Flash Messages -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i> <span th:text="${successMsg}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${errorMsg}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div layout:fragment="content"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        $(document).ready(function () {
            $('#sidebarCollapse').on('click', function () {
                $('#sidebar').toggleClass('active');
            });
            
            // Initialize DataTables
            $('.datatable').DataTable({
                "pageLength": 10,
                "responsive": true
            });
        });
    </script>
</body>
</html>

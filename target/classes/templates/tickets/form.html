<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Raise Ticket</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">Support Request Form</div>
                    <div class="card-body">
                        <form th:action="@{/tickets/save}" th:object="${ticket}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select th:field="*{category}" class="form-select" required>
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Subject</label>
                                <input type="text" th:field="*{subject}" class="form-control" placeholder="Short summary of the issue" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Provide details about your request..." required></textarea>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a th:href="@{/tickets}" class="text-decoration-none text-muted"><i class="fas fa-arrow-left me-1"></i> Back to tickets</a>
                                <button type="submit" class="btn btn-primary px-4">Submit Ticket</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

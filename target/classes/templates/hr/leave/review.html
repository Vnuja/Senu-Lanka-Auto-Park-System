<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Review Leave Request</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">Review Leave Request</div>
                    <div class="card-body">
                        <div class="mb-4 text-center">
                            <i class="fas fa-clipboard-check fa-3x text-primary mb-3"></i>
                            <h4>Review Details for <span th:text="${leave.user.username}">User</span></h4>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-sm-4 fw-bold">Leave Type:</div>
                            <div class="col-sm-8" th:text="${leave.leaveType}">Annual</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-4 fw-bold">Duration:</div>
                            <div class="col-sm-8 text-muted">
                                <span th:text="${leave.startDate}">2023-01-01</span> to <span th:text="${leave.endDate}">2023-01-02</span>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-4 fw-bold">Reason:</div>
                            <div class="col-sm-8">
                                <p class="card-text border p-2 rounded bg-light" th:text="${leave.reason}">Reason text here...</p>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-sm-4 fw-bold">Status:</div>
                            <div class="col-sm-8">
                                <span class="badge bg-warning" th:text="${leave.status}">PENDING</span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center gap-3">
                            <form th:action="@{/hr/leave/approve/{id}(id=${leave.leaveId})}" method="post">
                                <button type="submit" class="btn btn-success px-4"><i class="fas fa-check me-1"></i> Approve</button>
                            </form>
                            <form th:action="@{/hr/leave/reject/{id}(id=${leave.leaveId})}" method="post">
                                <button type="submit" class="btn btn-danger px-4"><i class="fas fa-times me-1"></i> Reject</button>
                            </form>
                            <a href="/hr/dashboard" class="btn btn-outline-secondary px-4"> Cancel</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>System History</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0 text-primary"><i class="fas fa-history me-2"></i> System Activity History</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover datatable align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Timestamp</th>
                                <th>User</th>
                                <th>Action</th>
                                <th>Entity Type</th>
                                <th>Entity ID</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${logs}">
                                <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}">2023-10-27 10:00:00</td>
                                <td>
                                    <span th:if="${log.user != null}">
                                        <i class="fas fa-user-circle text-secondary me-1"></i>
                                        <span th:text="${log.user.username}">Username</span>
                                        <small class="text-muted d-block" th:text="${log.user.role}">Role</small>
                                    </span>
                                    <span th:if="${log.user == null}" class="text-muted">System</span>
                                </td>
                                <td>
                                    <span class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle" th:text="${log.action}">Action</span>
                                </td>
                                <td th:text="${log.entity}">Entity</td>
                                <td th:text="${log.entityId}">ID</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

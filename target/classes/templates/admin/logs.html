<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>System Logs</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card shadow-sm">
            <div class="card-header bg-white">Full System Activity Logs</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-sm table-hover datatable">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>User</th>
                                <th>Action</th>
                                <th>Entity</th>
                                <th>ID</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${logs}">
                                <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}">Time</td>
                                <td th:text="${log.user != null ? log.user.username : 'SYSTEM'}">admin</td>
                                <td th:text="${log.action}">CREATE_USER</td>
                                <td th:text="${log.entity}">User</td>
                                <td th:text="${log.entityId}">1</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

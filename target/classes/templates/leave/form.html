<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Submit Leave</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card shadow-sm">
            <div class="card-header bg-white">Submit Leave Request</div>
            <div class="card-body">
                <form th:action="@{/leave/save}" th:object="${leaveRequest}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Leave Type</label>
                        <select th:field="*{leaveType}" class="form-select" required>
                            <option th:each="type : ${leaveTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Start Date</label>
                            <input type="date" th:field="*{startDate}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">End Date</label>
                            <input type="date" th:field="*{endDate}" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <textarea th:field="*{reason}" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/leave}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Submit Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

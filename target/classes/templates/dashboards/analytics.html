<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Org Management Analytics</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Attendance Trends</div>
                    <div class="card-body" style="height: 300px; display: flex; align-items: center; justify-content: center;">
                        <p class="text-muted"><i class="fas fa-chart-area me-2"></i> Attendance Chart Placeholder</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Payroll Distribution</div>
                    <div class="card-body" style="height: 300px; display: flex; align-items: center; justify-content: center;">
                        <p class="text-muted"><i class="fas fa-chart-pie me-2"></i> Payroll Chart Placeholder</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">Department Breakdown</div>
                    <div class="card-body text-center py-5">
                        <p class="text-muted">Detailed performance and staff analytics will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

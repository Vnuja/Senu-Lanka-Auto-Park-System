<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>My Attendance</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="card shadow-sm">
            <div class="card-header bg-white">Attendance History</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover datatable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                                <th sec:authorize="hasAnyRole('SYSTEM_ADMIN', 'HR_MANAGER')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rec : ${records}">
                                <td th:text="${rec.date}">2023-01-01</td>
                                <td th:text="${rec.checkIn}">08:00</td>
                                <td th:text="${rec.checkOut}">17:00</td>
                                <td>
                                    <span class="badge" th:classappend="${rec.status.name() == 'PRESENT' ? 'bg-success' : 'bg-danger'}" th:text="${rec.status}">Present</span>
                                </td>
                                <td sec:authorize="hasAnyRole('SYSTEM_ADMIN', 'HR_MANAGER')">
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#editAttModal' + ${rec.attendanceId}"><i class="fas fa-edit"></i></button>
                                        <form th:action="@{/attendance/delete/{id}(id=${rec.attendanceId})}" method="post" onsubmit="return confirm('Delete this attendance record?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                        </form>
                                    </div>
                                    
                                    <!-- Edit Modal -->
                                    <div class="modal fade" th:id="'editAttModal' + ${rec.attendanceId}" tabindex="-1">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <form th:action="@{/attendance/update/{id}(id=${rec.attendanceId})}" method="post">
                                                    <div class="modal-header">
                                                        <h5 class="modal-title">Edit Attendance</h5>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        <div class="mb-3">
                                                            <label class="form-label">Check In Time</label>
                                                            <input type="time" class="form-control" name="checkIn" th:value="${rec.checkIn}">
                                                        </div>
                                                        <div class="mb-3">
                                                            <label class="form-label">Check Out Time</label>
                                                            <input type="time" class="form-control" name="checkOut" th:value="${rec.checkOut}">
                                                        </div>
                                                        <div class="mb-3">
                                                            <label class="form-label">Status</label>
                                                            <select class="form-select" name="status" required>
                                                                <option value="PRESENT" th:selected="${rec.status.name() == 'PRESENT'}">Present</option>
                                                                <option value="ABSENT" th:selected="${rec.status.name() == 'ABSENT'}">Absent</option>
                                                                <option value="LATE" th:selected="${rec.status.name() == 'LATE'}">Late</option>
                                                                <option value="ON_LEAVE" th:selected="${rec.status.name() == 'ON_LEAVE'}">On Leave</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                                        <button type="submit" class="btn btn-primary">Save changes</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

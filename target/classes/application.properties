spring.application.name=staff-management-system

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/staff_mgmt_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf Properties
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Properties
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.staffms=DEBUG

# File Upload (if needed for profile pics in future)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
